<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>梦核开屏动画</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #04050b;
      --bg2: #0a1020;
      --room: #111827;
      --room2: #1d2742;
      --glass: rgba(115, 255, 232, 0.14);
      --neon-cyan: #66f6ff;
      --neon-pink: #ff4fd8;
      --neon-violet: #9d6bff;
      --neon-lime: #b7ff5c;
      --skin: #b99aa0;
      --skin-dark: #6b5660;
      --metal: #b7c6d6;
      --metal-dark: #3f4d61;
      --shadow: rgba(0, 0, 0, 0.55);
      --line: rgba(210, 245, 255, 0.26);
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 40%, rgba(75, 140, 255, 0.18), transparent 25%),
        radial-gradient(circle at 50% 70%, rgba(255, 79, 216, 0.10), transparent 24%),
        linear-gradient(180deg, #02030a 0%, #04050b 48%, #060816 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      perspective: 1200px;
      background:
        radial-gradient(circle at 50% 44%, rgba(101, 246, 255, 0.08), transparent 22%),
        radial-gradient(circle at 50% 70%, rgba(157, 107, 255, 0.12), transparent 20%),
        linear-gradient(180deg, #050710 0%, #090d1b 48%, #03040b 100%);
    }

    .scanlines,
    .grain,
    .vignette {
      pointer-events: none;
      position: absolute;
      inset: 0;
    }

    .scanlines {
      background: repeating-linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.03) 0,
        rgba(255, 255, 255, 0.03) 1px,
        transparent 1px,
        transparent 5px
      );
      mix-blend-mode: overlay;
      opacity: 0.24;
      animation: scanMove 7s linear infinite;
    }

    .grain {
      opacity: 0.1;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.16) 0 1px, transparent 1px),
        radial-gradient(circle at 70% 60%, rgba(255,255,255,0.12) 0 1px, transparent 1px),
        radial-gradient(circle at 40% 80%, rgba(255,255,255,0.14) 0 1px, transparent 1px),
        radial-gradient(circle at 80% 20%, rgba(255,255,255,0.10) 0 1px, transparent 1px);
      background-size: 180px 180px, 220px 220px, 260px 260px, 200px 200px;
      animation: grainJitter 5s steps(2, end) infinite;
    }

    .vignette {
      background: radial-gradient(circle at center, transparent 38%, rgba(0, 0, 0, 0.46) 100%);
    }

    .room {
      position: absolute;
      inset: 10vh 11vw 11vh 11vw;
      border-radius: 28px;
      background:
        radial-gradient(circle at 50% 36%, rgba(102, 246, 255, 0.06), transparent 24%),
        linear-gradient(180deg, rgba(18, 27, 47, 0.9), rgba(9, 13, 26, 0.96));
      box-shadow:
        0 0 0 1px rgba(161, 223, 255, 0.08),
        0 50px 120px rgba(0, 0, 0, 0.6),
        inset 0 0 60px rgba(102, 246, 255, 0.04);
      overflow: hidden;
      transform-style: preserve-3d;
    }

    .wall {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.03), transparent 28%),
        linear-gradient(90deg, rgba(255,255,255,0.02), transparent 22%, transparent 78%, rgba(255,255,255,0.02));
    }

    .floor {
      position: absolute;
      left: -2%;
      right: -2%;
      bottom: -3%;
      height: 42%;
      background:
        radial-gradient(ellipse at center top, rgba(255, 79, 216, 0.10), transparent 45%),
        linear-gradient(180deg, rgba(11, 15, 30, 0.15), rgba(5, 7, 14, 0.95));
      transform: perspective(1000px) rotateX(65deg);
      transform-origin: bottom center;
      filter: blur(0.3px);
    }

    .window {
      position: absolute;
      left: 50%;
      top: 12%;
      width: min(56vw, 760px);
      height: min(48vh, 460px);
      transform: translateX(-50%);
      border-radius: 22px;
      background:
        radial-gradient(circle at 50% 42%, rgba(135, 242, 255, 0.16), rgba(135, 242, 255, 0.05) 40%, rgba(18, 34, 63, 0.86) 100%);
      box-shadow:
        inset 0 0 0 3px rgba(161, 223, 255, 0.2),
        inset 0 0 35px rgba(102, 246, 255, 0.12),
        0 0 120px rgba(102, 246, 255, 0.08);
      overflow: hidden;
    }

    .window::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent 0 13%, rgba(255,255,255,0.06) 13% 14%, transparent 14% 45%, rgba(255,255,255,0.06) 45% 46%, transparent 46% 100%),
        linear-gradient(180deg, transparent 0 45%, rgba(255,255,255,0.06) 45% 46%, transparent 46% 100%);
      mix-blend-mode: screen;
      opacity: 0.55;
      pointer-events: none;
    }

    .outside-glow {
      position: absolute;
      inset: -10%;
      background:
        radial-gradient(circle at 50% 45%, rgba(255, 79, 216, 0.12), transparent 28%),
        radial-gradient(circle at 50% 50%, rgba(102, 246, 255, 0.08), transparent 36%);
      filter: blur(18px);
      opacity: 0.9;
      animation: pulseGlow 8s ease-in-out infinite;
    }

    .night-sky {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 28%, rgba(255,255,255,0.30) 0 1px, transparent 1px),
        radial-gradient(circle at 60% 18%, rgba(255,255,255,0.20) 0 1.5px, transparent 1.5px),
        radial-gradient(circle at 80% 35%, rgba(255,255,255,0.12) 0 1px, transparent 1px),
        linear-gradient(180deg, #06070d 0%, #090d1a 72%, #111422 100%);
      background-size: 320px 240px, 260px 220px, 380px 280px, 100% 100%;
      animation: skyDrift 16s linear infinite;
    }

    .mist {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 60%, rgba(157, 107, 255, 0.18), transparent 18%),
        radial-gradient(circle at 34% 66%, rgba(102, 246, 255, 0.12), transparent 16%),
        radial-gradient(circle at 66% 64%, rgba(255, 79, 216, 0.12), transparent 16%);
      filter: blur(18px);
      animation: mistFloat 10s ease-in-out infinite alternate;
    }

    .giant {
      position: absolute;
      left: 50%;
      top: -18%;
      width: 86%;
      height: 128%;
      transform: translateX(-50%);
      transform-origin: center bottom;
      filter: drop-shadow(0 0 28px rgba(255, 79, 216, 0.25));
      animation: giantBreath 6s ease-in-out infinite;
    }

    .giant-body {
      position: absolute;
      left: 50%;
      bottom: -2%;
      width: 56%;
      height: 76%;
      transform: translateX(-50%);
      background:
        radial-gradient(circle at 50% 20%, rgba(235, 201, 209, 0.18), transparent 22%),
        linear-gradient(180deg, rgba(74, 59, 84, 0.35), rgba(18, 18, 34, 0.95));
      border-radius: 48% 48% 32% 32% / 36% 36% 18% 18%;
      box-shadow:
        inset 0 0 30px rgba(255,255,255,0.04),
        inset 0 -18px 26px rgba(0,0,0,0.36);
      clip-path: polygon(17% 100%, 12% 78%, 18% 56%, 28% 34%, 34% 18%, 50% 10%, 66% 18%, 72% 34%, 82% 56%, 88% 78%, 83% 100%);
      opacity: 0.9;
    }

    .giant-head {
      position: absolute;
      left: 50%;
      top: 9%;
      width: 52%;
      height: 40%;
      transform: translateX(-50%);
      background:
        radial-gradient(circle at 50% 30%, rgba(255,255,255,0.18), transparent 16%),
        linear-gradient(180deg, rgba(143, 120, 143, 0.20), rgba(15, 13, 28, 0.95));
      border-radius: 48% 48% 42% 42% / 38% 38% 44% 44%;
      clip-path: polygon(12% 92%, 8% 54%, 18% 20%, 32% 8%, 68% 8%, 82% 20%, 92% 54%, 88% 92%, 76% 100%, 24% 100%);
      box-shadow: inset 0 -10px 18px rgba(0, 0, 0, 0.25);
    }

    .giant-face {
      position: absolute;
      left: 50%;
      top: 0;
      width: 100%;
      height: 100%;
      transform: translateX(-50%);
    }

    .giant-eye {
      position: absolute;
      top: 42%;
      width: 22%;
      height: 16%;
      background: radial-gradient(circle at 50% 50%, #f6fbff 0 32%, #8df9ff 34%, #2ef6ff 52%, #001018 80%);
      border-radius: 50%;
      box-shadow:
        0 0 26px rgba(102, 246, 255, 0.7),
        inset 0 0 8px rgba(255,255,255,0.55);
      overflow: hidden;
      transform: translateZ(20px);
    }

    .giant-eye.left { left: 19%; }
    .giant-eye.right { right: 19%; }

    .giant-eye::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 34%;
      height: 34%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff, #3c044e 45%, #080014 78%);
      box-shadow: 0 0 20px rgba(255, 79, 216, 0.8);
      animation: irisLook 7s ease-in-out infinite;
    }

    .giant-lid {
      position: absolute;
      left: 0;
      top: -1%;
      width: 100%;
      height: 52%;
      background: linear-gradient(180deg, rgba(18, 14, 34, 0.98), rgba(18, 14, 34, 0.92));
      border-radius: 50% 50% 40% 40% / 0 0 58% 58%;
      transform-origin: top center;
      animation: blinkLid 8s infinite;
      mix-blend-mode: multiply;
    }

    .giant-mouth {
      position: absolute;
      left: 50%;
      bottom: 12%;
      width: 24%;
      height: 10%;
      transform: translateX(-50%);
      border-bottom: 3px solid rgba(255, 79, 216, 0.24);
      border-radius: 0 0 120px 120px;
      box-shadow: 0 0 18px rgba(255, 79, 216, 0.12);
      opacity: 0.75;
    }

    .room-frame {
      position: absolute;
      inset: 11% 9% 8% 9%;
      border: 1px solid rgba(179, 232, 255, 0.11);
      border-radius: 22px;
      pointer-events: none;
    }

    .room-shadow {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 34%;
      background: linear-gradient(180deg, transparent, rgba(3, 5, 11, 0.72));
      pointer-events: none;
    }

    .table {
      position: absolute;
      left: 50%;
      bottom: 10%;
      width: 42%;
      height: 17%;
      transform: translateX(-50%) perspective(800px) rotateX(68deg);
      transform-origin: bottom center;
      background:
        linear-gradient(180deg, rgba(13, 15, 28, 0.2), rgba(3, 4, 10, 0.95)),
        linear-gradient(90deg, rgba(102, 246, 255, 0.04), rgba(255, 79, 216, 0.04));
      border-radius: 12px;
      box-shadow:
        0 0 0 1px rgba(178, 232, 255, 0.08),
        0 18px 40px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .maker {
      position: absolute;
      left: 50%;
      bottom: 15%;
      width: 30%;
      height: 42%;
      transform: translateX(-50%);
      filter: drop-shadow(0 0 20px rgba(102, 246, 255, 0.12));
    }

    .maker-head {
      position: absolute;
      left: 50%;
      top: 0;
      width: 22%;
      height: 22%;
      transform: translateX(-50%);
      background: radial-gradient(circle at 40% 35%, rgba(255,255,255,0.34), rgba(185, 154, 160, 0.95) 52%, rgba(59, 46, 58, 0.98) 100%);
      border-radius: 45% 45% 40% 40%;
      animation: makerNod 5.5s ease-in-out infinite;
    }

    .maker-body {
      position: absolute;
      left: 50%;
      top: 17%;
      width: 44%;
      height: 54%;
      transform: translateX(-50%);
      background: linear-gradient(180deg, rgba(189, 163, 171, 0.75), rgba(78, 64, 74, 0.96));
      border-radius: 30% 30% 36% 36% / 18% 18% 36% 36%;
      clip-path: polygon(24% 0%, 76% 0%, 88% 18%, 94% 56%, 84% 100%, 16% 100%, 6% 56%, 12% 18%);
      box-shadow: inset 0 -16px 18px rgba(0,0,0,0.28);
    }

    .maker-arms {
      position: absolute;
      inset: 28% 0 0;
    }

    .arm {
      position: absolute;
      top: 3%;
      width: 18%;
      height: 55%;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(217, 192, 196, 0.82), rgba(78, 65, 74, 0.96));
      transform-origin: top center;
      box-shadow: inset 0 -10px 10px rgba(0, 0, 0, 0.18);
    }

    .arm.left {
      left: 16%;
      transform: rotate(22deg);
      animation: armWorkLeft 2.8s ease-in-out infinite;
    }

    .arm.right {
      right: 16%;
      transform: rotate(-18deg);
      animation: armWorkRight 2.8s ease-in-out infinite;
    }

    .hand {
      position: absolute;
      bottom: -10%;
      left: 50%;
      width: 126%;
      height: 18%;
      transform: translateX(-50%);
      background: linear-gradient(180deg, rgba(244, 220, 224, 0.9), rgba(143, 116, 124, 0.96));
      border-radius: 999px;
      box-shadow: 0 0 12px rgba(255, 79, 216, 0.12);
    }

    .heart-core {
      position: absolute;
      left: 50%;
      top: 30%;
      width: 24%;
      height: 28%;
      transform: translateX(-50%);
      filter: drop-shadow(0 0 18px rgba(255, 79, 216, 0.55));
      animation: corePulse 1.8s ease-in-out infinite;
    }

    .heart {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 35% 35%, rgba(255,255,255,0.55), transparent 18%),
        linear-gradient(180deg, rgba(255, 79, 216, 0.95), rgba(157, 107, 255, 0.92));
      transform: rotate(-45deg);
      border-radius: 10% 46% 10% 46%;
      box-shadow:
        inset 0 -10px 20px rgba(0,0,0,0.25),
        0 0 30px rgba(255, 79, 216, 0.5);
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: inherit;
      border-radius: 50%;
    }

    .heart::before { top: -50%; left: 0; }
    .heart::after { left: 50%; top: 0; }

    .heart-rings {
      position: absolute;
      inset: -18%;
      border-radius: 50%;
      border: 1px solid rgba(102, 246, 255, 0.25);
      animation: ringSpread 2.8s ease-out infinite;
      box-shadow: 0 0 26px rgba(102, 246, 255, 0.08);
    }

    .heart-cables {
      position: absolute;
      inset: 42% 18% 18%;
      border-left: 2px solid rgba(102, 246, 255, 0.34);
      border-right: 2px solid rgba(255, 79, 216, 0.34);
      border-radius: 999px;
      filter: blur(0.2px);
      opacity: 0.75;
    }

    .tube {
      position: absolute;
      width: 18%;
      height: 1.3%;
      background: linear-gradient(90deg, transparent, rgba(102, 246, 255, 0.7), transparent);
      filter: blur(1px);
      animation: tubeScan 3.6s linear infinite;
    }

    .tube.t1 { left: 18%; top: 54%; transform: rotate(-14deg); }
    .tube.t2 { right: 18%; top: 52%; transform: rotate(16deg); animation-delay: -1.8s; }

    .caption {
      position: absolute;
      left: 50%;
      bottom: 4.5vh;
      transform: translateX(-50%);
      color: rgba(237, 249, 255, 0.8);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      font-size: clamp(10px, 1.2vw, 12px);
      text-shadow: 0 0 12px rgba(102, 246, 255, 0.24);
      mix-blend-mode: screen;
      opacity: 0;
      animation: captionIn 7.5s ease-in-out infinite;
    }

    .caption strong {
      color: white;
      font-weight: 700;
    }

    .pulse-flare {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 44vmin;
      height: 44vmin;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(102, 246, 255, 0.12), transparent 60%);
      filter: blur(28px);
      animation: flareBeat 1.8s ease-in-out infinite;
      pointer-events: none;
    }

    .frame-jitter {
      animation: frameShift 11s cubic-bezier(.35, 0, .15, 1) infinite;
    }

    @keyframes skyDrift {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(-3%, 2%, 0); }
    }

    @keyframes mistFloat {
      from { transform: translate3d(-2%, 1%, 0) scale(1); opacity: 0.72; }
      to { transform: translate3d(2%, -2%, 0) scale(1.06); opacity: 1; }
    }

    @keyframes giantBreath {
      0%, 100% { transform: translateX(-50%) translateY(0) scale(1); }
      50% { transform: translateX(-50%) translateY(1.2%) scale(1.012); }
    }

    @keyframes blinkLid {
      0%, 6%, 100% { transform: scaleY(0); opacity: 0; }
      7%, 8% { transform: scaleY(1); opacity: 0.85; }
      48%, 49% { transform: scaleY(1); opacity: 0.88; }
      50% { transform: scaleY(0.15); opacity: 0.2; }
      51%, 53% { transform: scaleY(1); opacity: 0.85; }
      82%, 83% { transform: scaleY(0.2); opacity: 0.3; }
      84%, 86% { transform: scaleY(1); opacity: 0.9; }
    }

    @keyframes irisLook {
      0%, 100% { transform: translate(-50%, -50%) translateX(0); }
      20% { transform: translate(-50%, -50%) translateX(-10%); }
      42% { transform: translate(-50%, -50%) translateX(12%); }
      62% { transform: translate(-50%, -50%) translateY(7%); }
      78% { transform: translate(-50%, -50%) translateX(-5%); }
    }

    @keyframes makerNod {
      0%, 100% { transform: translateX(-50%) translateY(0) rotate(0deg); }
      50% { transform: translateX(-50%) translateY(2%) rotate(-1deg); }
    }

    @keyframes armWorkLeft {
      0%, 100% { transform: rotate(22deg) translateY(0); }
      50% { transform: rotate(34deg) translateY(2%); }
    }

    @keyframes armWorkRight {
      0%, 100% { transform: rotate(-18deg) translateY(0); }
      50% { transform: rotate(-30deg) translateY(2%); }
    }

    @keyframes corePulse {
      0%, 100% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.12); }
    }

    @keyframes ringSpread {
      0% { transform: scale(0.72); opacity: 0.8; }
      100% { transform: scale(1.7); opacity: 0; }
    }

    @keyframes tubeScan {
      0% { transform: translateX(-26%) rotate(var(--r, 0deg)); opacity: 0; }
      16% { opacity: 0.9; }
      50% { opacity: 0.9; }
      100% { transform: translateX(26%) rotate(var(--r, 0deg)); opacity: 0; }
    }

    @keyframes captionIn {
      0%, 22% { opacity: 0; transform: translateX(-50%) translateY(10px); }
      35%, 72% { opacity: 0.95; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-6px); }
    }

    @keyframes pulseGlow {
      0%, 100% { opacity: 0.55; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.06); }
    }

    @keyframes scanMove {
      from { transform: translateY(-2%); }
      to { transform: translateY(2%); }
    }

    @keyframes grainJitter {
      0%, 100% { transform: translate3d(0,0,0); }
      50% { transform: translate3d(-1%, 1%, 0); }
    }

    @keyframes frameShift {
      0%, 100% { transform: translate3d(0, 0, 0); }
      12% { transform: translate3d(0.2%, -0.15%, 0); }
      25% { transform: translate3d(-0.15%, 0.08%, 0); }
      48% { transform: translate3d(0.12%, 0.12%, 0); }
      63% { transform: translate3d(-0.18%, -0.08%, 0); }
      81% { transform: translate3d(0.08%, 0.18%, 0); }
    }

    @keyframes flareBeat {
      0%, 100% { opacity: 0.48; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.92; transform: translate(-50%, -50%) scale(1.12); }
    }

    @media (max-width: 900px) {
      .room {
        inset: 6vh 4vw 8vh;
        border-radius: 20px;
      }

      .window {
        width: 84vw;
        height: 36vh;
        top: 11%;
      }

      .giant {
        width: 112%;
        top: -6%;
      }

      .table {
        width: 60%;
      }

      .maker {
        width: 48%;
      }

      .caption {
        letter-spacing: 0.2em;
        text-align: center;
        width: 90vw;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <main class="stage frame-jitter" aria-label="梦核风格开屏动画：房间内的人制作机械心脏，窗外巨人窥视">
    <div class="pulse-flare"></div>
    <div class="room">
      <div class="wall"></div>
      <div class="floor"></div>
      <div class="room-frame"></div>
      <div class="window">
        <div class="night-sky"></div>
        <div class="mist"></div>
        <div class="outside-glow"></div>
        <div class="giant" aria-hidden="true">
          <div class="giant-head">
            <div class="giant-face">
              <div class="giant-eye left"></div>
              <div class="giant-eye right"></div>
              <div class="giant-lid"></div>
              <div class="giant-mouth"></div>
            </div>
          </div>
          <div class="giant-body"></div>
        </div>
      </div>

      <div class="room-shadow"></div>

      <div class="table" aria-hidden="true"></div>
      <div class="tube t1" aria-hidden="true"></div>
      <div class="tube t2" aria-hidden="true"></div>

      <section class="maker" aria-hidden="true">
        <div class="maker-head"></div>
        <div class="maker-body"></div>
        <div class="maker-arms">
          <div class="arm left"><div class="hand"></div></div>
          <div class="arm right"><div class="hand"></div></div>
        </div>
        <div class="heart-core">
          <div class="heart-rings"></div>
          <div class="heart"></div>
          <div class="heart-cables"></div>
        </div>
      </section>

      <div class="caption">The room listens while <strong>the heart is built</strong></div>
    </div>

    <div class="scanlines"></div>
    <div class="grain"></div>
    <div class="vignette"></div>
  </main>
</body>
</html>
